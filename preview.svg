<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff5f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative circles (top right) -->
  <circle cx="1100" cy="50" r="80" fill="url(#accentGradient)" opacity="0.1"/>
  <circle cx="1050" cy="100" r="120" fill="url(#accentGradient)" opacity="0.05"/>

  <!-- Decorative circles (bottom left) -->
  <circle cx="50" cy="580" r="100" fill="url(#accentGradient)" opacity="0.08"/>
  <circle cx="150" cy="550" r="80" fill="url(#accentGradient)" opacity="0.06"/>

  <!-- Top accent line -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#00c853" stroke-width="3"/>

  <!-- Logo circle -->
  <circle cx="150" cy="150" r="60" fill="none" stroke="#00c853" stroke-width="3" opacity="0.3"/>
  <circle cx="150" cy="150" r="55" fill="rgba(0, 200, 83, 0.1)"/>
  <text x="150" y="165" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#00c853" text-anchor="middle">N</text>

  <!-- Main Title -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#00c853" text-anchor="middle">
    Nabtax Studio
  </text>

  <!-- Subtitle -->
  <text x="600" y="270" font-family="Arial, sans-serif" font-size="40" fill="#e0e0e0" text-anchor="middle">
    استوديو تطوير ألعاب مستقل
  </text>

  <!-- Description -->
  <text x="600" y="330" font-family="Arial, sans-serif" font-size="28" fill="#b0b0b0" text-anchor="middle">
    أفكار مبتكرة • تجارب فريدة • ألعاب ممتعة
  </text>

  <!-- Accent bars -->
  <rect x="250" y="380" width="700" height="3" fill="url(#accentGradient)" opacity="0.6"/>

  <!-- Stats or features -->
  <text x="250" y="450" font-family="Arial, sans-serif" font-size="22" fill="#00c853" font-weight="bold">
    🎮 تطوير ألعاب
  </text>
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="22" fill="#00c853" font-weight="bold">
    🎨 تصميم إبداعي
  </text>
  <text x="950" y="450" font-family="Arial, sans-serif" font-size="22" fill="#00c853" font-weight="bold">
    🚀 جودة عالية
  </text>

  <!-- Website URL -->
  <text x="600" y="570" font-family="Arial, sans-serif" font-size="24" fill="#888888" text-anchor="middle">
    nabtax.github.io/Nabtax-studio
  </text>

  <!-- Bottom accent line -->
  <line x1="0" y1="630" x2="1200" y2="630" stroke="#00c853" stroke-width="3"/>
</svg>