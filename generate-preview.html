<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Preview Generator</title>
    <style>
        body { margin: 0; padding: 0; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 1200;
        canvas.height = 630;

        // Create gradient background
        const gradient = ctx.createLinearGradient(0, 0, 1200, 630);
        gradient.addColorStop(0, '#0a0a0a');
        gradient.addColorStop(0.5, '#1a1a1a');
        gradient.addColorStop(1, '#0a0a0a');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 1200, 630);

        // Draw decorative shapes
        ctx.fillStyle = 'rgba(0, 200, 83, 0.1)';
        ctx.beginPath();
        ctx.arc(1100, 50, 80, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(1050, 100, 120, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(50, 580, 100, 0, Math.PI * 2);
        ctx.fill();

        // Top line
        ctx.strokeStyle = '#00c853';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(1200, 0);
        ctx.stroke();

        // Logo circle
        ctx.strokeStyle = '#00c853';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(150, 150, 60, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = '#00c853';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('N', 150, 150);

        // Main title
        ctx.fillStyle = '#00c853';
        ctx.font = 'bold 80px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Nabtax Studio', 600, 200);

        // Subtitle
        ctx.fillStyle = '#e0e0e0';
        ctx.font = '40px Arial';
        ctx.fillText('استوديو تطوير ألعاب مستقل', 600, 270);

        // Description
        ctx.fillStyle = '#b0b0b0';
        ctx.font = '28px Arial';
        ctx.fillText('أفكار مبتكرة • تجارب فريدة • ألعاب ممتعة', 600, 330);

        // Accent bar
        ctx.strokeStyle = '#00c853';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(250, 380);
        ctx.lineTo(950, 380);
        ctx.stroke();

        // Features
        ctx.fillStyle = '#00c853';
        ctx.font = 'bold 22px Arial';
        ctx.textAlign = 'left';
        ctx.fillText('🎮 تطوير ألعاب', 250, 450);
        ctx.textAlign = 'center';
        ctx.fillText('🎨 تصميم إبداعي', 600, 450);
        ctx.textAlign = 'right';
        ctx.fillText('🚀 جودة عالية', 950, 450);

        // Website URL
        ctx.fillStyle = '#888888';
        ctx.font = '24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('nabtax.github.io/Nabtax-studio', 600, 570);

        // Bottom line
        ctx.strokeStyle = '#00c853';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, 630);
        ctx.lineTo(1200, 630);
        ctx.stroke();

        // Download PNG
        canvas.toBlob(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'preview.png';
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
